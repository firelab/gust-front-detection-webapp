services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nfgda-service:
    build:
      context: ./nfgda_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - backend
    volumes:
      - ./job_results:/job_results
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - MAX_CONCURRENT_JOBS=2

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0